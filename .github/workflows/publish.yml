name: Publish to PyPI

# Publishes ONLY when you cut a GitHub Release. Uses PyPI Trusted Publishing
# (OIDC): GitHub proves the workflow's identity to PyPI directly, so there is
# NO API token stored anywhere and nothing to leak. Enable it first on PyPI:
# https://pypi.org/manage/account/publishing/ -> add a pending publisher with
#   owner = Akhilesh-Gogikar, repo = causal-certificate,
#   workflow = publish.yml   (Environment: leave BLANK — this workflow uses none)

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (no token — OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
